<!DOCTYPE html>
<html lang="ja" xmlns:th="https://www.thymeleaf.org" th:replace="layouts/base :: layout(~{::title},~{::main})">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポートフォリオ</title>
</head>

<body>
    <main>
        <article>
            <h1 th:text="#{work.list}"></h1>

            <th:block th:if="${works.size()}==0">
                <p th:text="#{work.empty}"></p>
            </th:block>
            <th:block th:if="${works.size()}!=0">
                <div th:each="work:${works}">
                    <h2 th:text="${work.title}"></h2>
                    <figure>
                        <img th:src="${work.thumbnail}" alt="作品のサムネイル">
                        <figcaption th:utext="${work.summary}"></figcaption>
                    </figure>
                    <p th:text="${work.repoUrl}"></p>
                </div>
            </th:block>
        </article>
    </main>
</body>

</html>
